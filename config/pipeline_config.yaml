# ──────────────────────────────────────────────
# Pipeline Configuration
# E-commerce Data Pipeline with Automated ETL
# ──────────────────────────────────────────────

# Extraction Settings
extraction:
  mode: "full"                          # Options: full, incremental
  batch_size: 10000
  tables:
    - name: "customers"
      strategy: "full"                  # Small dimension — full reload
      timestamp_column: "updated_at"
    - name: "products"
      strategy: "full"                  # Small dimension — full reload
      timestamp_column: "updated_at"
    - name: "orders"
      strategy: "incremental"
      timestamp_column: "updated_at"
    - name: "order_items"
      strategy: "incremental"
      timestamp_column: null            # Loaded via order_id lookup
    - name: "payments"
      strategy: "incremental"
      timestamp_column: "payment_date"

# Transformation Settings
transformation:
  date_dimension:
    start_date: "2024-01-01"
    end_date: "2027-12-31"
  customer_segments:
    premium_threshold_amount: 10000     # INR
    premium_threshold_orders: 5
    regular_threshold_amount: 2000
    regular_threshold_orders: 1

# Loading Settings
loading:
  dimensions:
    strategy: "full_reload"             # Dimensions are fully reloaded
  facts:
    strategy: "truncate_append"         # Facts are rebuilt each batch
    chunk_size: 5000

# Data paths
paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  logs: "logs"

# Schedule (Airflow)
schedule:
  cron: "0 2 * * *"                     # Daily at 02:00 UTC
  max_retries: 3
  retry_delay_minutes: 5
